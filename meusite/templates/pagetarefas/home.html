<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<body>
<style>
table, th, td {
  border: 1px solid black;
}
</style>
</head>
<body>

 tarefa in tarefas %

<tr>
    <td>{{ tarefa.descricao }}</td>
    <td>{{ tarefa.status }}</td>
    <td>{{ tarefa.data_Criação }}</td>
    <td>{{%if Tarefa}.status%}Completo{% else %}incompleto{% endif %}</td>
    <td><a href="{% url 'tarefas:editar' id=tarefa.id %}">Editar</a></td>
    <td><a href="{% url 'tarefas:remover' id=tarefa.id%}">Remover</a></td>
    
</tr>
dfor %



<table style="width:100%">
  <tr>
    
    <th>descrição</th>
    <th>status</th> 
    <th>data</th>
  </tr>
  <tr>
    <!-- descrição -->
    <td>Jill</td>
    <td>Smith</td>
    <td>50</td>
  </tr>
  <tr>
    <!-- status -->
    <td>Eve</td>
    <td>Jackson</td>
    <td>94</td>
  </tr>
  <tr>
    <!-- data -->
    <td>John</td>
    <td>Doe</td>
    <td>80</td>
  </tr>
</table>
</body>
</html>
